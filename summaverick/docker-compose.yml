# Optional infrastructure for the production memory layer.
#
# The demo build runs entirely on SQLite and needs none of this — it's here so
# the Postgres+pgvector / Redis path documented in the README is one command
# away when you outgrow SQLite.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: summaverick
      POSTGRES_PASSWORD: summaverick
      POSTGRES_DB: summaverick
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
